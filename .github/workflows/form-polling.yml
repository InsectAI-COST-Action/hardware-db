name: Form Response Polling

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  poll-form:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need to fetch full history for state file management
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run form polling
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd /home/runner/work/hardware-db/hardware-db
          python formTrigger_v2_polling.py
        continue-on-error: true

      - name: Commit state file if updated
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          # Only commit if state file was modified
          if git diff --quiet data/formTrigger_state.json 2>/dev/null; then
            echo "[*] No state changes to commit"
          else
            git add data/formTrigger_state.json
            git commit -m "Update form polling state [skip ci]" || echo "[*] State file already up to date"
            git push
          fi
        continue-on-error: true

      - name: Debug info
        if: failure()
        run: |
          echo "Workflow failed - checking environment..."
          echo "Python version:"
          python --version
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -la
