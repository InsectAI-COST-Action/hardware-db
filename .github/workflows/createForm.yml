name: Create Form

on:
  push:
  # workflow_run:
  # workflows: ["Tests"]
  # types: [completed]

permissions:
  contents: write

jobs:
  create_form:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
        OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
        REFRESH_TOKEN_JSON: ${{ secrets.REFRESH_TOKEN_JSON }}
    steps:
      - name: Checkout commit that triggered tests
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check if schema changed
        run: |
          git fetch --no-tags --prune --unshallow || true
          git diff --name-only ${{ github.event.workflow_run.head_sha }}^ ${{ github.event.workflow_run.head_sha }} > changed.txt || true
          if ! grep -q '^hardware-db_schema.json$' changed.txt; then
            echo "No schema changes; skipping."
            exit 0
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Run createForm
        # env:
        #   OAUTH_CLIENT_JSON: ${{ github.workspace }}/OAuth_client.json
        run: python createForm.py
