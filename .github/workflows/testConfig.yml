name: Testing config parsing

on:
  push:
    # paths:
    #   - '*schema*.json'
  workflow_dispatch:

jobs:
  testing_config:
    name: Testing config
    runs-on: ubuntu-latest
    env:
        SCOPES: "myenvscope1 myenvscope2"
        SCHEMA_FILE: "this_is_an_env_schema.json"
        # OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
        # REFRESH_TOKEN_JSON: ${{ secrets.REFRESH_TOKEN_JSON }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2
          pip install -e .

      - name: Testing config parsing from CLI
        run: |
          python testConfig.py --scopes thisismyscope1 thisismyscope2 --schema-file "this_is_a_test_schema.json" --debug > CLI_parsing.txt
          cat <<'EXPECTED' > CLI_expected.txt
          SCOPES               -> ['thisismyscope1', 'thisismyscope2']   (list)
          DEBUG                -> True   (bool)
          SCHEMA_FILE          -> 'this_is_a_test_schema.json'   (str)
          EXPECTED
          diff -u CLI_expected.txt CLI_parsing.txt
        working-directory: tests
    
      - name: Testing config parsing from env
        run: |
          python testConfig.py > Env_parsing.txt
          cat <<'EXPECTED' > Env_expected.txt
          SCOPES               -> ['myenvscope1', 'myenvscope2']   (list)
          DEBUG                -> False   (bool)
          SCHEMA_FILE          -> 'this_is_an_env_schema.json'   (str)
          EXPECTED
          diff -u Env_expected.txt Env_parsing.txt
        working-directory: tests

      - name: Merge workflow and .env vars
        # The expected behaviour is that vars declared in this workflow supersede those in .env, 
        # but vars not declared should be picked up from .env
        run: |
          # Print out cfg dictionary
          python -c "from configParsing import build_config; SCOPES=[]; DEBUG=True; SCHEMA_FILE=""; FORM_ID=""; PARENT_DIR=""; cfg = build_config(globals()); print(cfg)"
          
          # Check that vars only present in .env file are being picked up
          python -c "from configParsing import build_config; SCOPES=[]; DEBUG=True; SCHEMA_FILE=""; FORM_ID=""; PARENT_DIR=""; cfg = build_config(globals())" > Merged_config.txt
          for key in FORM_ID PARENT_DIR; do
            grep "^$key" Merged_config.txt \
              | grep -E "->[[:space:]]*'[A-Za-z0-9_-]{5,}'"
          done

          # Check that vars assigned in workflow take precedence over .env
          sed -n '1,/FORM_ID/p' Merged_config.txt > filtered_output.txt
          cat <<'EXPECTED' > expected.txt
          SCOPES               -> ['myenvscope1', 'myenvscope2']   (list)
          DEBUG                -> False   (bool)
          SCHEMA_FILE          -> 'this_is_an_env_schema.json'   (str)
          FORM_ID              ->
          EXPECTED
          diff -u expected.txt filtered_output.txt
        working-directory: tests
  