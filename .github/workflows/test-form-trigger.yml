name: Test Form Trigger

on:
  repository_dispatch:
    types: [new_form_response]   # must match GITHUB_EVENT in the script

jobs:
  echo-payload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show received payload
        run: |
          echo "Event type:       ${{ github.event.action }}"
          echo "Form ID:          ${{ github.event.client_payload.formId }}"
          echo "Response ID:      ${{ github.event.client_payload.responseId }}"
          echo "Previous DeviceID: ${{ github.event.client_payload.previousDeviceID }}"
          echo "Timestamp:        ${{ github.event.client_payload.timestamp }}"

      - name: Validate payload
        if: ${{ !github.event.client_payload.formId || !github.event.client_payload.previousDeviceID }}
        run: |
          echo "[ERROR] Missing required fields in payload"
          exit 1

      - name: Success - payload received
        run: |
          echo "[SUCCESS] Form response detected!"
          echo "Device ID from form: ${{ github.event.client_payload.previousDeviceID }}"
          echo "Response ID: ${{ github.event.client_payload.responseId }}"
