name: Testing config parsing

on:
  push:
    # paths:
    #   - '*schema*.json'
  workflow_dispatch:

jobs:
  testing_config:
    name: Testing config
    runs-on: ubuntu-latest
    env:
        SCOPES: "myenvscope1 myenvscope2"
        DEBUG: "True"
        SCHEMA_FILE: "this_is_an_env_schema.json"
        # OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
        # REFRESH_TOKEN_JSON: ${{ secrets.REFRESH_TOKEN_JSON }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2
          pip install -e .

      - name: Testing config parsing from CLI
        run: python test_cfg.py --scopes thisismyscope1 thisismyscope2 --schema-file "this_is_a_test_schema.json" --debug
    
      - name: Testing config parsing from env
        run: python test_cfg.py