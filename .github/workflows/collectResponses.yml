  collect_responses:
    # needs: check_tests
    runs-on: ubuntu-latest
    env:
        OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
        REFRESH_TOKEN_JSON: ${{ secrets.REFRESH_TOKEN_JSON }}
    # if: ${{ needs.check_tests.outputs.tests_ok == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Run collect responses
        run: python collectResponses.py

      - name: Commit and push data outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data || true
          git commit -m "Update data from form responses" || echo "No changes to commit"
          git push
