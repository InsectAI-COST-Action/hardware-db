name: Create Form

on:
  workflow_run:
    workflows: ["Tests"]
    types: 
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_form:
    runs-on: ubuntu-latest
    env:
        TZ: Europe/Zurich
        OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
        REFRESH_TOKEN_JSON: ${{ secrets.REFRESH_TOKEN_JSON }}
    steps:
      - name: Checkout branch that triggered tests
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Check if schema changed
        id: schema_check
        run: |
          # Fetch sufficient history to compare commits safely
          git fetch --depth=20 --no-tags --prune origin 2>/dev/null || true
          
          # Load SCHEMA_FILE from .env (allow GitHub Actions override)
          SCHEMA_FILE="${{ env.SCHEMA_FILE }}"
          if [ -z "$SCHEMA_FILE" ]; then
            SCHEMA_FILE=$(grep '^SCHEMA_FILE=' .env | cut -d'=' -f2 | xargs)
          fi
          
          echo "Schema file: $SCHEMA_FILE"
          
          # Get changed files from HEAD~1 to HEAD (safe for shallow clones)
          if git diff HEAD~1 HEAD --name-only > changed.txt 2>/dev/null; then
            echo "Compared HEAD~1 to HEAD"
          elif git log --oneline -n 2 > /dev/null 2>&1; then
            # Fallback: if we have at least 2 commits, use them
            PREV_SHA=$(git log --format=%H -n 2 | tail -1)
            git diff "$PREV_SHA" HEAD --name-only > changed.txt 2>/dev/null || echo "" > changed.txt
            echo "Compared $PREV_SHA to HEAD"
          else
            # Last resort: just check if the file exists in the current commit
            echo "Only one commit available, checking current HEAD"
            git ls-tree -r --name-only HEAD | grep "^${SCHEMA_FILE}$" > changed.txt 2>/dev/null || echo "" > changed.txt
          fi
          
          if grep -q "^${SCHEMA_FILE}$" changed.txt; then
            echo "schema_changed=true" >> $GITHUB_OUTPUT
            echo "Schema file $SCHEMA_FILE has changed; proceeding."
            echo "::notice::Schema file $SCHEMA_FILE has changed; proceeding."
          else
            echo "schema_changed=false" >> $GITHUB_OUTPUT
            echo "No schema changes in $SCHEMA_FILE; skipping."
            echo "::notice::No schema changes in $SCHEMA_FILE; skipping."
          fi

      - name: Set up Python
        if: steps.schema_check.outputs.schema_changed == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.schema_check.outputs.schema_changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Run createForm
        if: steps.schema_check.outputs.schema_changed == 'true'
        # env:
        #   OAUTH_CLIENT_JSON: ${{ github.workspace }}/OAuth_client.json
        run: python createForm.py --update-links

      - name: Commit and push changes
        if: steps.schema_check.outputs.schema_changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .env README.md
          git commit -m "Update form ID and link" || true
          git push || true
