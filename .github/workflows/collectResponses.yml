name: Collect Responses

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_run:
    workflows: ["Create Form"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  check_tests:
    runs-on: ubuntu-latest
    # Only proceed if:
    # - not triggered by workflow_run
    # - OR Create Form succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    outputs:
      tests_ok: ${{ steps.check.outputs.tests_ok }}

    steps:
      - name: Check latest tests run success
        id: check
        uses: actions/github-script@v6
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'tests.yml',
              per_page: 1
            });

            if (!runs.data.workflow_runs || runs.data.workflow_runs.length === 0) {
              core.setOutput('tests_ok', 'false');
            } else {
              const conclusion = runs.data.workflow_runs[0].conclusion;
              core.setOutput('tests_ok', conclusion === 'success' ? 'true' : 'false');
            }

  collect_responses:
    needs: check_tests
    runs-on: ubuntu-latest
    if: ${{ needs.check_tests.outputs.tests_ok == 'true' }}

    env:
      TZ: Europe/Zurich
      OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
      REFRESH_TOKEN_JSON: ${{ secrets.REFRESH_TOKEN_JSON }}
      TOKEN_COLLECT_RESPONSES: "" # force use of refresh token

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Run collect responses
        run: python collectResponses.py

      - name: Commit and push data outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data || true
          git commit -m "Update data from form responses" || echo "No changes to commit"
          git push
