name: Tests

on:
  push:
    paths:
      - '*schema*.json'
      - 'tests/**'
      - 'src/**'
      - '.env'
      - 'collectResponses.py'
      - 'createForm.py'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  validate_json:
    name: Validate JSON schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Run schema validation
        run: python validateJSON.py
        working-directory: tests

  test_config_parsing:
    name: Testing configuration parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Test config parsing precedence order
        run: python test_config_parse.py
        working-directory: tests

  test_config_precedence:    
    name: Verify GitHub Actions env vars take precedence over .env
    runs-on: ubuntu-latest
    env:
      SCOPES: "myenvscope1 myenvscope2"
      SCHEMA_FILE: "this_is_an_env_schema.json"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]
      
      - name: Test env variables precedence order
        run: |
          echo "Testing that GitHub Actions env vars override .env values..."
          python testConfig.py SCOPES SCHEMA_FILE > env_precedence.txt
          
          echo "Expected: SCOPES and SCHEMA_FILE should have GitHub Actions env values"
          cat env_precedence.txt
          
          # Check SCOPES came from env (GitHub Actions), not .env
          if grep -q "SCOPES.*myenvscope1.*myenvscope2" env_precedence.txt; then
            echo "✓ SCOPES correctly has GitHub Actions env value"
          else
            echo "✗ SCOPES does not have expected GitHub Actions env value"
            exit 1
          fi
          
          # Check SCHEMA_FILE came from env (GitHub Actions), not .env
          if grep -q "SCHEMA_FILE.*this_is_an_env_schema.json" env_precedence.txt; then
            echo "✓ SCHEMA_FILE correctly has GitHub Actions env value"
          else
            echo "✗ SCHEMA_FILE does not have expected GitHub Actions env value"
            exit 1
          fi
        working-directory: tests
  
  test_auth:
    name: Drive auth & file ops (optional)
    # needs: validate_json
    runs-on: ubuntu-latest
    env:
        OAUTH_CLIENT_JSON: ${{ secrets.OAUTH_CLIENT_JSON }}
        REFRESH_TOKEN_JSON: ${{ secrets.REFRESH_TOKEN_JSON }}
        SCOPES: "https://www.googleapis.com/auth/drive.file"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ci]

      - name: Run Drive auth test
        run: python tests/testAuth.py
